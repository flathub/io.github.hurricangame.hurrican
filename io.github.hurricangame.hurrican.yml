app-id: io.github.hurricangame.hurrican
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: hurrican
finish-args:
  - --device=all
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
modules:
  - shared-modules/SDL2/SDL2_image.json

  - name: libopenmpt
    buildsystem: autotools
    config-opts:
      - --without-mpg123
      - --without-portaudio
      - --without-portaudiocpp
      - --without-ogg
      - --without-vorbis
      - --without-vorbisfile
      - --without-sndfile
      - --without-flac
    sources:
      - type: archive
        url: https://lib.openmpt.org/files/libopenmpt/src/libopenmpt-0.6.2+release.autotools.tar.gz
        sha256: 50c0d62ff2d9afefa36cce9f29042cb1fb8d4f0b386b81a0fc7734f35e21e6b6

  - name: hurrican
    buildsystem: cmake-ninja
    builddir: true
    subdir: Hurrican
    config-opts:
      - -DOPENMPT=ON
      - -DCMAKE_BUILD_TYPE=Release
    post-install:
      - install -Dm644 ../../${FLATPAK_ID}.desktop -t /app/share/applications/
      - install -Dm644 ../../${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 ../../${FLATPAK_ID}.png -t /app/share/icons/hicolor/256x256/apps/
    sources:
      - type: git
        url: https://github.com/HurricanGame/Hurrican
        # The latest commit from the repository
        commit: 0d91d1f2d40f38d21e7f41afc01369ee55649fb6
      - type: file
        path: io.github.hurricangame.hurrican.desktop
      - type: file
        path: io.github.hurricangame.hurrican.metainfo.xml
      - type: file
        path: io.github.hurricangame.hurrican.png

